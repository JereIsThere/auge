# /etc/nginx/sites-available/auge2
#
# Auge 2.0 – auge2.jeremias-groehl.de
# Interner Next.js-Prozess läuft auf Port 3010

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name auge2.jeremias-groehl.de;

    # Certbot platziert hier seinen ACME-Challenge-Handler automatisch
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name auge2.jeremias-groehl.de;

    # Let's Encrypt (nach `certbot --nginx -d auge2.jeremias-groehl.de` gefüllt)
    ssl_certificate     /etc/letsencrypt/live/auge2.jeremias-groehl.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auge2.jeremias-groehl.de/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security-Header
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header Referrer-Policy          "strict-origin" always;

    # Statische Next.js-Assets – lang gecacht, unveränderliche Hashes im Dateinamen
    location /_next/static/ {
        alias /var/www/auge2/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Öffentliche Dateien (falls vorhanden)
    location /public/ {
        alias /var/www/auge2/public/;
        expires 7d;
        access_log off;
    }

    # Alles andere → Next.js-Prozess
    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
