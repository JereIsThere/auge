<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="auge — Sammlung von Notizen, Guides und Experimenten." />
    <meta name="color-scheme" content="dark" />
    <title>auge</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="home">
    <a href="#main" class="skip-link">Zum Inhalt springen</a>

    <div id="cur" aria-hidden="true"></div>
    <div id="cur-dot" aria-hidden="true"></div>
    <canvas id="cyr-canvas" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <div id="sb-overlay" class="sb-overlay" aria-hidden="true"></div>

    <div class="app-shell">
      <aside id="sidebar" class="sidebar" aria-label="Navigation"></aside>

      <div class="main-wrap">
        <div class="mob-hd" aria-hidden="true">
          <button id="sb-toggle" class="sb-toggle" aria-label="Navigation öffnen" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
          <span class="mob-brand">AUGE</span>
        </div>

        <main class="stage" id="main">
          <!-- Corner ornaments -->
          <svg class="oc tl" viewBox="0 0 56 56" fill="none" aria-hidden="true">
            <path d="M4 4 L4 26 M4 4 L26 4" stroke="#6b00cc" stroke-width="1.5" opacity=".7"/>
            <path d="M11 11 L11 19 M11 11 L19 11" stroke="#d4a200" stroke-width="1" opacity=".6"/>
            <circle cx="4" cy="4" r="2.5" fill="#d4a200" opacity=".8"/>
            <circle cx="11" cy="11" r="1.5" fill="#6b00cc" opacity=".6"/>
          </svg>
          <svg class="oc tr" viewBox="0 0 56 56" fill="none" style="transform:scaleX(-1)" aria-hidden="true">
            <path d="M4 4 L4 26 M4 4 L26 4" stroke="#6b00cc" stroke-width="1.5" opacity=".7"/>
            <path d="M11 11 L11 19 M11 11 L19 11" stroke="#d4a200" stroke-width="1" opacity=".6"/>
            <circle cx="4" cy="4" r="2.5" fill="#d4a200" opacity=".8"/>
            <circle cx="11" cy="11" r="1.5" fill="#6b00cc" opacity=".6"/>
          </svg>
          <svg class="oc bl" viewBox="0 0 56 56" fill="none" style="transform:scaleY(-1)" aria-hidden="true">
            <path d="M4 4 L4 26 M4 4 L26 4" stroke="#6b00cc" stroke-width="1.5" opacity=".7"/>
            <path d="M11 11 L11 19 M11 11 L19 11" stroke="#d4a200" stroke-width="1" opacity=".6"/>
            <circle cx="4" cy="4" r="2.5" fill="#d4a200" opacity=".8"/>
            <circle cx="11" cy="11" r="1.5" fill="#6b00cc" opacity=".6"/>
          </svg>
          <svg class="oc br" viewBox="0 0 56 56" fill="none" style="transform:scale(-1)" aria-hidden="true">
            <path d="M4 4 L4 26 M4 4 L26 4" stroke="#6b00cc" stroke-width="1.5" opacity=".7"/>
            <path d="M11 11 L11 19 M11 11 L19 11" stroke="#d4a200" stroke-width="1" opacity=".6"/>
            <circle cx="4" cy="4" r="2.5" fill="#d4a200" opacity=".8"/>
            <circle cx="11" cy="11" r="1.5" fill="#6b00cc" opacity=".6"/>
          </svg>

          <div class="home-hero">
            <div class="orn" aria-hidden="true">
              <div class="orn-line"></div>
              <span class="orn-sym">◈ &nbsp; ✦ &nbsp; ◈</span>
              <div class="orn-line"></div>
            </div>

            <div class="title-wrap">
              <h1 class="main-title" data-text="AUGE">AUGE</h1>
            </div>
            <span class="sub-cyr" aria-hidden="true">ОКО ВИДИТ ВСЁ</span>
            <span class="sub-de">das auge sieht alles</span>

            <div class="orn-b" aria-hidden="true">
              <div class="orn-line"></div>
              <span style="color:#d4a200;font-size:.8rem">✦</span>
              <div class="orn-line"></div>
            </div>
          </div>

          <div class="home-topics">
            <div id="links-stack"></div>
          </div>
        </main>
      </div>
    </div>

    <div id="cmd" class="cmd-overlay" hidden role="dialog" aria-modal="true" aria-label="Schnellsuche">
      <div class="cmd-box">
        <div class="cmd-input-row">
          <span class="cmd-icon" aria-hidden="true">◈</span>
          <input id="cmd-q" class="cmd-q" type="search"
            placeholder="Topic suchen…" autocomplete="off" spellcheck="false"
            aria-label="Topic suchen" role="combobox"
            aria-controls="cmd-list" aria-autocomplete="list">
          <button id="cmd-close" class="cmd-esc" aria-label="Schließen">ESC</button>
        </div>
        <ul id="cmd-list" class="cmd-list" role="listbox" aria-label="Suchergebnisse"></ul>
        <div class="cmd-footer">
          <span>↑↓ navigieren</span>
          <span>↵ öffnen</span>
          <span>ESC schließen</span>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
