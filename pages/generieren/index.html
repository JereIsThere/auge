<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="generieren — auge. Thema rein, Lernseite raus." />
    <title>generieren · auge</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Zum Inhalt springen</a>
    <main id="main">
      <a href="/" aria-label="Zurück zur Übersicht">← zurück</a>
      <h1>generieren</h1>
      <p class="lead">Thema rein · Pipeline läuft · Markdown wird zu Lernseite. Erstmal mit dem normalen Chat-Workflow plus JS-Nachbearbeitung — Träumer→Denker kommt später.</p>

      <form id="genForm" class="gen-form" autocomplete="off">
        <label class="gen-field">
          <span class="gen-label">Thema oder Konzept</span>
          <input id="topic" name="topic" required spellcheck="false" placeholder="z.B. Closures in JavaScript" />
        </label>

        <div class="gen-row">
          <label class="gen-field">
            <span class="gen-label">Level</span>
            <select id="level" name="level">
              <option value="einsteiger">Einsteiger</option>
              <option value="mittel" selected>Mittel</option>
              <option value="fortgeschritten">Fortgeschritten</option>
            </select>
          </label>

          <label class="gen-field">
            <span class="gen-label">Modell</span>
            <select id="model" name="model">
              <optgroup label="Anthropic">
                <option value="claude-opus-4-7">Claude Opus 4.7</option>
                <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6</option>
                <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
              </optgroup>
              <optgroup label="OpenAI">
                <option value="gpt-4o-mini">GPT-4o mini</option>
              </optgroup>
              <optgroup label="Google">
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
              </optgroup>
            </select>
          </label>
        </div>

        <details class="gen-advanced">
          <summary>Advanced</summary>
          <label class="gen-field">
            <span class="gen-label">Webhook URL</span>
            <input id="webhook" name="webhook" type="url" spellcheck="false" placeholder="https://n8n.jeremias-groehl.de/webhook/ai-chat" />
            <span class="gen-hint">Wird in localStorage gemerkt.</span>
          </label>
          <label class="gen-field">
            <span class="gen-label">Extra Prompt-Hinweis (optional)</span>
            <textarea id="extra" name="extra" rows="2" placeholder="z.B. Bezug auf React, oder „inklusive Hooks-Beispiel"."></textarea>
          </label>
          <label class="gen-field">
            <span class="gen-label">Publish Webhook URL</span>
            <input id="publishWebhook" name="publishWebhook" type="url" spellcheck="false" placeholder="https://n8n.jeremias-groehl.de/webhook/auge-publish" />
            <span class="gen-hint">n8n-Endpoint der einen PR im auge-Repo aufmacht.</span>
          </label>
        </details>

        <div class="gen-actions">
          <button type="submit" id="genSubmit" class="gen-btn primary">Generieren</button>
          <button type="button" id="genCancel" class="gen-btn ghost" hidden>Abbrechen</button>
        </div>
      </form>

      <div id="status" class="gen-status" aria-live="polite"></div>

      <article id="result" class="markdown-body gen-result" hidden></article>

      <div id="resultActions" class="gen-result-actions" hidden>
        <button type="button" id="submitPrBtn" class="gen-btn primary">PR einreichen</button>
        <button type="button" id="copyBtn" class="gen-btn">Markdown kopieren</button>
        <button type="button" id="downloadMdBtn" class="gen-btn">.md herunterladen</button>
        <button type="button" id="downloadHtmlBtn" class="gen-btn">.html herunterladen</button>
        <button type="button" id="newBtn" class="gen-btn">Neu</button>
      </div>

      <div id="prResult" class="gen-pr-result" hidden></div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
