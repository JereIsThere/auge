name: Deploy Auge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Bauen (standalone)
        run: npm run build
        env:
          USE_EXAMPLE_DATA: 'true'

      - name: Standalone-Paket zusammensetzen
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then
            cp -r public .next/standalone/public
          fi

      - name: SSH-Key einrichten
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUGE2_SSH_KEY }}

      - name: Bekannte Hosts eintragen
        run: |
          ssh-keyscan -p ${{ secrets.AUGE2_SSH_PORT }} -H ${{ secrets.AUGE2_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Dateien auf Server übertragen
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.AUGE2_SSH_PORT }}" \
            --exclude='.env.local' \
            .next/standalone/ \
            ${{ secrets.AUGE2_SSH_USER }}@${{ secrets.AUGE2_SSH_HOST }}:/var/www/auge2/

      - name: Dienst neu starten
        run: |
          ssh -p ${{ secrets.AUGE2_SSH_PORT }} \
            ${{ secrets.AUGE2_SSH_USER }}@${{ secrets.AUGE2_SSH_HOST }} \
            "sudo systemctl restart auge2 && systemctl is-active auge2"

      - name: Deploy-Zusammenfassung
        run: |
          echo "✓ https://auge2.jeremias-groehl.de"
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
