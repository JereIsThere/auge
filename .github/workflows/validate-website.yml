name: Validate Website

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build site
        run: npm run build

  auto-merge:
    name: Auto-merge if pages-only
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == github.repository_owner
    steps:
      - name: Check changed paths
        id: paths
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          mapfile -t FILES < <(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json files --jq '.files[].path')
          echo "Changed files:"
          printf '  %s\n' "${FILES[@]}"
          OUT=safe
          for f in "${FILES[@]}"; do
            case "$f" in
              pages/*) ;;
              *) OUT=out_of_scope ;;
            esac
          done
          echo "scope=$OUT" >> "$GITHUB_OUTPUT"
          echo "Scope: $OUT"

      - name: Enable auto-merge
        if: steps.paths.outputs.scope == 'safe'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge --auto --squash ${{ github.event.pull_request.number }} --repo $GITHUB_REPOSITORY
